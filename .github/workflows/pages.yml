name: Validate and publish WarMap Daily

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pipeline dependencies
        run: python -m pip install -r requirements.txt
      - name: Run safety-gate tests
        run: python -m unittest discover -s pipeline/tests -v
      - name: Validate geometry and provenance
        run: python pipeline/validate_snapshot.py data/current.geojson --evidence data/evidence.json --sources data/sources.json
      - name: Validate public records
        run: python pipeline/validate_data.py
      - name: Validate published schemas
        run: python pipeline/validate_schemas.py
      - name: Check JavaScript syntax
        run: node --check assets/app.js
      - name: Upload static site
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
