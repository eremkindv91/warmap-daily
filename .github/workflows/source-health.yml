name: Daily source health

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: source-health
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pipeline dependencies
        run: python -m pip install -r requirements.txt
      - name: Collect delayed geolocated map updates
        continue-on-error: true
        run: python pipeline/fetch_deepstate_updates.py
      - name: Check public source homepages
        run: python pipeline/check_sources.py
      - name: Validate refreshed public records
        run: |
          python pipeline/validate_data.py
          python -m unittest discover -s pipeline/tests -v
      - name: Publish health status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-health.json data/status.json data/events.json data/evidence.json data/updates.geojson data/settlements.json data/settlements-index.json
          if git diff --cached --quiet; then
            echo "Source health unchanged"
          else
            git commit -m "Update source health"
            git push
          fi
      - name: Upload refreshed site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: check
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy refreshed source status
        id: deployment
        uses: actions/deploy-pages@v5
