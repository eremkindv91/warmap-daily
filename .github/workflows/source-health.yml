name: Daily source health

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: source-health
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check public source homepages
        run: python pipeline/check_sources.py
      - name: Publish health status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-health.json
          if git diff --cached --quiet; then
            echo "Source health unchanged"
          else
            git commit -m "Update source health"
            git push
          fi
